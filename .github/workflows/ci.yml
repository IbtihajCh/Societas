name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ── Simulation Engine ──────────────────────────────────────
  simulation-checks:
    name: "Simulation (lint + test)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./simulation

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: |
            simulation/requirements*.txt
            shared/pyproject.toml

      - name: Install shared package
        run: pip install -e ../shared

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt 2>/dev/null || pip install -r requirements.txt

      - name: Lint (ruff)
        run: pip install ruff && ruff check .

      - name: Type check (mypy)
        run: pip install mypy && mypy .

      - name: Test (pytest)
        run: pip install pytest pytest-cov && pytest --cov --cov-branch --cov-fail-under=0

  # ── Backend API ────────────────────────────────────────────
  backend-checks:
    name: "Backend (lint + test)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: |
            backend/requirements*.txt
            shared/pyproject.toml

      - name: Install shared package
        run: pip install -e ../shared

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt 2>/dev/null || pip install -r requirements.txt

      - name: Lint (ruff)
        run: pip install ruff && ruff check .

      - name: Type check (mypy)
        run: pip install mypy && mypy .

      - name: Test (pytest)
        run: pip install pytest pytest-cov && pytest --cov --cov-fail-under=0

  # ── Frontend ───────────────────────────────────────────────
  frontend-checks:
    name: "Frontend (lint + test)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

  # ── Prompt Validation ──────────────────────────────────────
  prompt-validation:
    name: "Prompts (schema validation)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Validate prompt schemas
        run: |
          python -c "
          import json, os, glob
          prompt_dir = 'prompts'
          md_files = glob.glob(f'{prompt_dir}/*.md')
          assert len(md_files) >= 1, 'No prompt files found'
          print(f'Found {len(md_files)} prompt files')
          for f in md_files:
              fname = os.path.basename(f)
              if fname == 'system-prompts.md':
                  print(f'  ~ {f} (components library, skipping)')
                  continue
              with open(f) as fh:
                  content = fh.read()
              assert 'Input Schema' in content or 'Input' in content, f'{f}: missing input schema'
              assert 'Output Schema' in content or 'Output' in content, f'{f}: missing output schema'
              print(f'  ✓ {f}')
          print('All prompts validated')
          "
