services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: societas-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - VLLM_BASE_URL=${VLLM_BASE_URL:-http://129.212.187.34:8000/v1}
      - VLLM_BASE_URL_E2B=${VLLM_BASE_URL_E2B:-http://129.212.187.34:8001/v1}
      - VLLM_BASE_URL_MOE_26B=${VLLM_BASE_URL_MOE_26B:-http://129.212.187.34:8002/v1}
      - VLLM_BASE_URL_DENSE_31B=${VLLM_BASE_URL_DENSE_31B:-http://129.212.187.34:8000/v1}
      - API_KEY_E2B=${API_KEY_E2B:-}
      - API_KEY_MOE_26B=${API_KEY_MOE_26B:-}
      - API_KEY_DENSE_31B=${API_KEY_DENSE_31B:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    restart: unless-stopped
    networks:
      - societas-net

  simulation:
    build:
      context: ..
      dockerfile: docker/simulation.Dockerfile
    container_name: societas-simulation
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ../simulation:/app
    restart: unless-stopped
    networks:
      - societas-net

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    container_name: societas-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/ws
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - societas-net

  vllm:
    build:
      context: ..
      dockerfile: docker/vllm-rocm.Dockerfile
    container_name: societas-vllm
    ports:
      - "${VLLM_PORT:-8001}:8001"
    environment:
      - MODEL_NAME=${VLLM_MODEL:-google/gemma-4-31B}
      - GPU_MEMORY_UTILIZATION=${GPU_MEMORY_UTILIZATION:-0.90}
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
      - render
    shm_size: '8gb'
    restart: unless-stopped
    networks:
      - societas-net

networks:
  societas-net:
    driver: bridge
